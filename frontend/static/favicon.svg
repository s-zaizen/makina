  <path d="M15,50 C20,34 34,21 50,21 C66,21 80,34 85,50 C80,66 66,79 50,79 C34,79 20,66 15,50 Z"
        fill="#080c15" stroke="#4338ca" stroke-width="1.2" opacity="0.9"/>
  <circle cx="50" cy="50" r="18.5" fill="url(#irisGrad)"/>
  <circle cx="50" cy="50" r="18.5" fill="none" stroke="#4338ca" stroke-width="1.1"/>
  <g clip-path="url(#irisClip)" opacity="0.7">
    <line x1="31.5" y1="44" x2="68.5" y2="44" stroke="#4338ca" stroke-width="0.55"/>
    <line x1="31.5" y1="56" x2="68.5" y2="56" stroke="#4338ca" stroke-width="0.55"/>
    <line x1="38"   y1="42.3" x2="38"   y2="45.7" stroke="#818cf8" stroke-width="0.9"/>
    <line x1="50"   y1="42.3" x2="50"   y2="45.7" stroke="#818cf8" stroke-width="0.9"/>
    <line x1="62"   y1="42.3" x2="62"   y2="45.7" stroke="#818cf8" stroke-width="0.9"/>
    <line x1="38"   y1="54.3" x2="38"   y2="57.7" stroke="#818cf8" stroke-width="0.9"/>
    <line x1="50"   y1="54.3" x2="50"   y2="57.7" stroke="#818cf8" stroke-width="0.9"/>
    <line x1="62"   y1="54.3" x2="62"   y2="57.7" stroke="#818cf8" stroke-width="0.9"/>
    <line x1="50" y1="33" x2="50" y2="67" stroke="#312e81" stroke-width="0.4" opacity="0.5"/>
  </g>
  <circle cx="50" cy="50" r="14.5" fill="none" stroke="#4f46e5"
          stroke-width="0.65" stroke-dasharray="4 2.2" opacity="0.75"/>
  <circle cx="50" cy="50" r="9.5"  fill="none" stroke="#6366f1" stroke-width="0.6" opacity="0.55"/>
  <circle cx="31.5" cy="44" r="1.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="68.5" cy="44" r="1.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="31.5" cy="56" r="1.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="68.5" cy="56" r="1.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="6.8" fill="#030712"/>
