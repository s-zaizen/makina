    - pattern: req.body.$X
    - pattern: req.params.$X
    - pattern: request.query.$X
    - pattern: request.body.$X
  pattern-sinks:
    - pattern: $DB.query(...)
    - pattern: $DB.execute(...)
    - pattern: $POOL.query(...)
    - pattern: $CONN.query(...)
    - pattern: $KNEX.raw(...)
    - pattern: $SEQ.query(...)
